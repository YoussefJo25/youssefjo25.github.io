backend:
  name: github
  repo: YoussefJo25/YoussefJo25.github.io
  branch: main                       # ⚠️ غيّرها لو الفرع الأساسي اسمه master بدل main

# Where uploaded media files (covers, pdfs) get stored in the repo
media_folder: ""   # root of the repo, same place as the existing book images
public_folder: ""  # so the generated URLs match how books.json already references files

collections:
  - name: "books"
    label: "الكتب (Reading List)"
    label_singular: "كتاب"
    files:
      - name: "books"
        label: "قائمة الكتب"
        file: "books.json"
        format: "json"
        fields:
          - name: "books"
            label: "Books"
            label_singular: "Book"
            widget: "list"
            fields:
              - { name: "category", label: "التصنيف", widget: "select", options: ["religious", "programming", "self-development"] }
              - { name: "isArabic", label: "الكتاب بالعربي؟", widget: "boolean", default: true }
              - { name: "title", label: "عنوان الكتاب", widget: "string" }
              - { name: "author", label: "المؤلف / الوصف", widget: "string" }
              - { name: "cover", label: "صورة الغلاف", widget: "file" }
              - { name: "pdf", label: "ملف PDF", widget: "file" }

  - name: "certificates"
    label: "الشهادات (My Certificates)"
    label_singular: "شهادة"
    files:
      - name: "certificates"
        label: "قائمة الشهادات"
        file: "certificates.json"
        format: "json"
        fields:
          - name: "certificates"
            label: "Certificates"
            label_singular: "Certificate"
            widget: "list"
            fields:
              - { name: "category", label: "التصنيف", widget: "select", options: ["programming-advices", "iti"] }
              - { name: "title", label: "اسم الشهادة", widget: "string" }
              - { name: "issuer", label: "الجهة المانحة", widget: "string" }
              - { name: "cover", label: "صورة الشهادة", widget: "file" }
              - { name: "file", label: "ملف الشهادة (PDF أو صورة)", widget: "file" }
