<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad-c05" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="accentGrad-c05" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <rect width="400" height="600" fill="url(#bgGrad-c05)"/>

  <!-- corner frame -->
  <rect x="18" y="18" width="364" height="564" fill="none" stroke="#222222" stroke-width="1.5"/>
  <rect x="30" y="30" width="340" height="540" fill="none" stroke="#C8102E" stroke-width="1" opacity="0.5"/>

  <!-- top accent bar -->
  <rect x="30" y="30" width="340" height="6" fill="url(#accentGrad-c05)"/>

  <!-- code glyph mark -->
  <text x="200" y="160" font-family="Playfair Display, serif" font-size="64" fill="#C8102E" text-anchor="middle" font-weight="600">&lt;/&gt;</text>

  <!-- big number -->
  <text x="200" y="300" font-family="Playfair Display, serif" font-size="120" fill="#EDEDED" text-anchor="middle" font-weight="400">05</text>

  <!-- divider line -->
  <line x1="130" y1="345" x2="270" y2="345" stroke="#D4AF37" stroke-width="1.5"/>

  <!-- level label -->
  <text x="200" y="395" font-family="Inter, sans-serif" font-size="22" fill="#D4AF37" text-anchor="middle" font-weight="600" letter-spacing="2">LEVEL 2</text>

  <!-- track label -->
  <text x="200" y="440" font-family="Inter, sans-serif" font-size="15" fill="#A0A0A0" text-anchor="middle" letter-spacing="1">ALGORITHMS &amp;</text>
  <text x="200" y="462" font-family="Inter, sans-serif" font-size="15" fill="#A0A0A0" text-anchor="middle" letter-spacing="1">PROBLEM-SOLVING</text>

  <!-- bottom badge type -->
  <rect x="120" y="500" width="160" height="34" rx="17" fill="none" stroke="#C8102E" stroke-width="1.2"/>
  <text x="200" y="522" font-family="Inter, sans-serif" font-size="11" fill="#C8102E" text-anchor="middle" font-weight="600" letter-spacing="1.5">GRADUATION</text>

  <!-- footer brand -->
  <text x="200" y="565" font-family="Inter, sans-serif" font-size="11" fill="#A0A0A0" text-anchor="middle" letter-spacing="1.5">PROGRAMMINGADVICES</text>
</svg>